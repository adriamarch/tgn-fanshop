<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TGN Fan Shop | Contacte</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d0d0d;
      color: white;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background-color: #1a1a1a;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(230, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      text-align: center;
    }

    h1 {
      color: #e60000;
      font-size: 2rem;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 20px;
      color: #ccc;
    }

    .email-box {
      background-color: #2c2c2c;
      border-radius: 8px;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #e0e0e0;
      font-size: 1rem;
      margin-bottom: 20px;
      overflow-wrap: anywhere;
    }

    .email-text {
      flex: 1;
      margin-right: 10px;
    }

    .copy-btn {
      background-color: #e60000;
      border: none;
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background-color 0.3s;
    }

    .copy-btn:hover {
      background-color: #cc0000;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.9em;
      color: #999;
    }

    /* Responsive design */
    @media (max-width: 480px) {
      .container {
        padding: 25px 20px;
      }

      h1 {
        font-size: 1.6rem;
      }

      p {
        font-size: 1rem;
      }

      .email-box {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .copy-btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Contacte</h1>
    <p>Si tens cap dubte, escriu-nos a:</p>

    <div class="email-box">
      <span class="email-text" id="email">administracio@tgnfan.shop</span>
      <button class="copy-btn" onclick="copyEmail()">Copia</button>
    </div>

    <div class="footer">Et respondrem tan aviat com puguem :)</div>
  </div>

  <script>
    function copyEmail() {
      const email = document.getElementById("email").innerText;
      navigator.clipboard.writeText(email).then(() => {
        alert("Correu copiat al porta-retalls!");
      });
    }
  </script>
</body>
</html>
