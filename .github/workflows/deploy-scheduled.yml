name: Deploy llançament 18:00
on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Activar versió completa
        run: |
          cp index-complet.html index.html
          git config user.email "bot@tgnfan.shop"
          git config user.name "Deploy Bot"
          git add index.html
          git commit -m "Llançament 18:00 - Activa productes"
          git push